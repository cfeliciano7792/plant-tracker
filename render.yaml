services:
  - type: web
    name: plant-tracker
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: PERENUAL_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FAMILY_INVITE_CODE
        sync: false
